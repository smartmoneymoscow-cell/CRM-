<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Preloader — Preview v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 20px;
}
h1 { color: #fff; font-size: 18px; font-weight: 600; }
h2 { color: #8C8576; font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.card {
  background: #fff;
  border-radius: 20px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 320px;
}
canvas { display: block; }

/* Progress bar */
.progress-track {
  width: 200px;
  height: 6px;
  background: #F3EEE4;
  border-radius: 3px;
  margin: 14px auto 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #D4A85A, #E89829);
  border-radius: 3px;
  transition: width 0.3s ease;
}
.label {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: #8C8576;
}
.controls {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 8px 14px;
  border: 1px solid #E7E0D1;
  border-radius: 8px;
  background: #FAF6EE;
  font-size: 12px;
  cursor: pointer;
  color: #14130F;
  font-weight: 600;
}
.controls button:hover { background: #F3EEE4; }
.controls button.active {
  background: #E89829;
  color: #fff;
  border-color: #E89829;
}
</style>
</head>
<body>

<h1>🐟 Float Preloader — v2</h1>

<div class="card">
  <h2>Indeterminate (поиск принтеров)</h2>
  <canvas id="c1" width="600" height="240"></canvas>
  <div class="progress-track"><div id="fill1" class="progress-fill"></div></div>
  <div class="label" id="label1">Ищем принтеры…</div>
</div>

<div class="card">
  <h2>Determinate (печать)</h2>
  <canvas id="c2" width="600" height="240"></canvas>
  <div class="progress-track"><div id="fill2" class="progress-fill"></div></div>
  <div class="label" id="label2">Подключение…</div>
  <div class="controls">
    <button onclick="setDet(0)">0%</button>
    <button onclick="setDet(0.25)">25%</button>
    <button onclick="setDet(0.5)">50%</button>
    <button onclick="setDet(0.75)">75%</button>
    <button onclick="setDet(1)">100%</button>
    <button onclick="animateDet()">▶ Анимация</button>
  </div>
</div>

<script>
// === Float Renderer ===
class FloatRenderer {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.w = canvas.width;
    this.h = canvas.height;
    this.bobTime = 0;
    this.waveTime = 0;
    this.bobSpeed = opts.bobSpeed || 0.018;
    this.waveSpeed = opts.waveSpeed || 0.008;
    this.running = true;
    this.loop();
  }

  loop() {
    if (!this.running) return;
    this.bobTime += this.bobSpeed;
    this.waveTime += this.waveSpeed;
    this.draw();
    requestAnimationFrame(() => this.loop());
  }

  draw() {
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    ctx.clearRect(0, 0, w, h);

    // Water surface — single elegant line
    const waterY = h * 0.62;
    const bob = Math.sin(this.bobTime * Math.PI) * 14;
    const waveOffset = this.waveTime * 2 * Math.PI;

    // Water fill (semi-transparent below surface)
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    for (let x = 0; x <= w; x += 2) {
      const y = waterY + Math.sin((x / w) * 3 * Math.PI + waveOffset) * 4
                    + Math.sin((x / w) * 5 * Math.PI - waveOffset * 0.7) * 2;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = 'rgba(42, 106, 126, 0.12)';
    ctx.fill();

    // Water surface line
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const y = waterY + Math.sin((x / w) * 3 * Math.PI + waveOffset) * 4
                    + Math.sin((x / w) * 5 * Math.PI - waveOffset * 0.7) * 2;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(42, 106, 126, 0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // === Float body ===
    const floatX = cx;
    const floatBaseY = waterY - 10 + bob;

    // --- Stem (thin rod above water) ---
    const stemTop = floatBaseY - 70;
    const stemBottom = floatBaseY - 15;
    ctx.beginPath();
    ctx.moveTo(floatX, stemTop);
    ctx.lineTo(floatX, stemBottom);
    ctx.strokeStyle = '#6B5B3A';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();

    // --- Flag (pennant) ---
    ctx.beginPath();
    ctx.moveTo(floatX + 2, stemTop);
    ctx.lineTo(floatX + 22, stemTop + 10);
    ctx.lineTo(floatX + 2, stemTop + 20);
    ctx.closePath();
    ctx.fillStyle = '#C9302C';
    ctx.fill();
    // Flag highlight
    ctx.beginPath();
    ctx.moveTo(floatX + 2, stemTop + 2);
    ctx.lineTo(floatX + 16, stemTop + 10);
    ctx.lineTo(floatX + 2, stemTop + 14);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fill();

    // --- Upper body (red/orange) — tapered oval ---
    const bodyTop = floatBaseY - 18;
    const bodyMid = floatBaseY + 5;
    ctx.beginPath();
    ctx.ellipse(floatX, (bodyTop + bodyMid) / 2, 10, (bodyMid - bodyTop) / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#C9302C';
    ctx.fill();
    // Glossy highlight
    ctx.beginPath();
    ctx.ellipse(floatX - 3, (bodyTop + bodyMid) / 2 - 3, 4, 8, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // --- Lower body (orange/amber) — tapered ---
    const lowerTop = bodyMid - 2;
    const lowerBottom = floatBaseY + 25;
    ctx.beginPath();
    ctx.moveTo(floatX - 8, lowerTop);
    ctx.quadraticCurveTo(floatX - 6, (lowerTop + lowerBottom) / 2, floatX - 3, lowerBottom);
    ctx.quadraticCurveTo(floatX, lowerBottom + 2, floatX + 3, lowerBottom);
    ctx.quadraticCurveTo(floatX + 6, (lowerTop + lowerBottom) / 2, floatX + 8, lowerTop);
    ctx.closePath();
    ctx.fillStyle = '#E89829';
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(floatX - 2, lowerTop + 6, 3, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();

    // --- Keel (small weighted bottom) ---
    const keelY = lowerBottom + 2;
    ctx.beginPath();
    ctx.ellipse(floatX, keelY, 5, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#8C8576';
    ctx.fill();
    // Keel ring
    ctx.beginPath();
    ctx.arc(floatX, keelY, 3, 0, Math.PI * 2);
    ctx.strokeStyle = '#6B5B3A';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // --- Line (fishing line going down into water) ---
    ctx.beginPath();
    ctx.moveTo(floatX, keelY + 4);
    ctx.lineTo(floatX, waterY + 30);
    ctx.strokeStyle = 'rgba(100,100,100,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  destroy() { this.running = false; }
}

// === Indeterminate progress (smooth left-to-right) ===
const f1 = new FloatRenderer(document.getElementById('c1'), { bobSpeed: 0.022, waveSpeed: 0.007 });
const fill1 = document.getElementById('fill1');
const label1 = document.getElementById('label1');
let p1 = 0;
let dir1 = 1;
function tick1() {
  p1 += 0.008 * dir1;
  if (p1 >= 1) { p1 = 1; dir1 = -1; }
  if (p1 <= 0) { p1 = 0; dir1 = 1; }
  fill1.style.width = (p1 * 100) + '%';
  requestAnimationFrame(tick1);
}
tick1();

// === Determinate ===
const f2 = new FloatRenderer(document.getElementById('c2'), { bobSpeed: 0.015, waveSpeed: 0.005 });
const fill2 = document.getElementById('fill2');
const label2 = document.getElementById('label2');
let detP = 0;

function setDet(v) {
  detP = v;
  fill2.style.width = (v * 100) + '%';
  if (v === 0) label2.textContent = 'Подключение…';
  else if (v < 0.3) label2.textContent = 'Подключение…';
  else if (v < 0.7) label2.textContent = 'Печать…';
  else if (v < 1) label2.textContent = 'Отправка данных…';
  else label2.textContent = 'Чек отправлен ✓';
}

function animateDet() {
  detP = 0;
  fill2.style.width = '0%';
  label2.textContent = 'Подключение…';
  const iv = setInterval(() => {
    detP += 0.015;
    if (detP >= 1) { detP = 1; clearInterval(iv); }
    setDet(detP);
  }, 60);
}
</script>

</body>
</html>
