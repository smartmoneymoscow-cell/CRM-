<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float Preloader — v6</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 20px;
}
h1 { color: #fff; font-size: 18px; font-weight: 600; }
h2 { color: #8C8576; font-size: 13px; font-weight: 500; margin-bottom: 12px; }
.card {
  background: #fff;
  border-radius: 20px;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 260px;
}
canvas { display: block; }
.progress-track {
  width: 160px;
  height: 4px;
  background: #F3EEE4;
  border-radius: 2px;
  margin: 10px auto 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #D4A85A, #E89829);
  border-radius: 2px;
  transition: width 0.15s linear;
}
.label {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: #8C8576;
}
.controls {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 6px 12px;
  border: 1px solid #E7E0D1;
  border-radius: 6px;
  background: #FAF6EE;
  font-size: 11px;
  cursor: pointer;
  color: #14130F;
  font-weight: 600;
}
.controls button:hover { background: #F3EEE4; }
.controls button.accent {
  background: #E89829;
  color: #fff;
  border-color: #E89829;
}
</style>
</head>
<body>

<h1>🐟 Float Preloader — v6</h1>

<div class="card">
  <h2>Покой + Поклёвка</h2>
  <canvas id="c1" width="300" height="200"></canvas>
  <div class="progress-track"><div id="fill1" class="progress-fill"></div></div>
  <div class="label" id="label1">Ищем принтеры…</div>
  <div class="controls">
    <button class="accent" onclick="triggerBite()">🎣 Поклёвка</button>
    <button onclick="togglePause()">⏸ Пауза</button>
  </div>
</div>

<div class="card">
  <h2>Печать (determinate)</h2>
  <canvas id="c2" width="300" height="200"></canvas>
  <div class="progress-track"><div id="fill2" class="progress-fill"></div></div>
  <div class="label" id="label2">Подключение…</div>
  <div class="controls">
    <button onclick="animateDet()">▶ Печать</button>
  </div>
</div>

<script>
class FloatAnimator {
  constructor(canvas, opts = {}) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.w = canvas.width;
    this.h = canvas.height;
    this.bobTime = 0;
    this.bobSpeed = opts.bobSpeed || 0.02;
    this.paused = false;
    this.bitePhase = 0;
    this.biteTime = 0;
    this.biteDipOffset = 0;
    this.biteTilt = 0;
    this.running = true;
    this.loop();
  }

  loop() {
    if (!this.running) return;
    if (!this.paused) {
      this.bobTime += this.bobSpeed;
      this.updateBite();
    }
    this.draw();
    requestAnimationFrame(() => this.loop());
  }

  triggerBite() {
    if (this.bitePhase !== 0) return;
    this.bitePhase = 1;
    this.biteTime = 0;
  }

  updateBite() {
    if (this.bitePhase === 0) return;
    this.biteTime += 0.025;
    switch (this.bitePhase) {
      case 1:
        this.biteDipOffset = this.easeOutCubic(Math.min(this.biteTime / 0.3, 1)) * 30;
        this.biteTilt = this.easeOutCubic(Math.min(this.biteTime / 0.3, 1)) * 0.12;
        if (this.biteTime >= 0.3) { this.bitePhase = 2; this.biteTime = 0; }
        break;
      case 2:
        this.biteDipOffset = 30 + this.easeInOutCubic(Math.min(this.biteTime / 0.5, 1)) * 25;
        this.biteTilt = 0.12 + this.easeInOutCubic(Math.min(this.biteTime / 0.5, 1)) * 0.08;
        if (this.biteTime >= 0.5) { this.bitePhase = 3; this.biteTime = 0; }
        break;
      case 3:
        const riseT = this.easeOutBounce(Math.min(this.biteTime / 0.8, 1));
        this.biteDipOffset = 55 * (1 - riseT);
        this.biteTilt = 0.2 * (1 - riseT);
        if (this.biteTime >= 0.8) { this.bitePhase = 4; this.biteTime = 0; }
        break;
      case 4:
        const wobbleT = Math.min(this.biteTime / 1.2, 1);
        this.biteDipOffset = Math.sin(this.biteTime * 12) * 3 * (1 - wobbleT);
        this.biteTilt = Math.sin(this.biteTime * 10) * 0.02 * (1 - wobbleT);
        if (this.biteTime >= 1.2) { this.bitePhase = 0; this.biteDipOffset = 0; this.biteTilt = 0; }
        break;
    }
  }

  easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  easeOutBounce(t) {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t+0.75; }
    if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t+0.9375; }
    t -= 2.625/2.75; return 7.5625*t*t+0.984375;
  }

  draw() {
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    ctx.clearRect(0, 0, w, h);

    const waterY = h * 0.58;
    const bob = Math.sin(this.bobTime * Math.PI) * 5;
    const extraDip = this.biteDipOffset;

    // Water
    ctx.fillStyle = 'rgba(42, 106, 126, 0.08)';
    ctx.fillRect(0, waterY, w, h - waterY);
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    ctx.lineTo(w, waterY);
    ctx.strokeStyle = 'rgba(42, 106, 126, 0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // === FLOAT ===
    ctx.save();
    ctx.translate(cx, waterY - 2 + bob + extraDip);
    ctx.rotate(this.biteTilt);

    // --- Keel (draw first, behind body) ---
    ctx.beginPath();
    ctx.moveTo(0, 26);
    ctx.lineTo(0, 42);
    ctx.strokeStyle = '#6B5B3A';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Keel weight — small tapered oval
    ctx.beginPath();
    ctx.ellipse(0, 44, 3, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#4A3D28';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 44, 3, 5, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // --- Body: realistic pear shape using bezier curves ---
    // The body is a classic "груша" (pear) shape — narrow at top, wide at bottom

    // White bottom portion (below waterline)
    ctx.beginPath();
    ctx.moveTo(0, -6);          // top junction
    ctx.bezierCurveTo(7, -2, 11, 10, 9, 22);   // right side
    ctx.bezierCurveTo(7, 26, 3, 26, 0, 26);    // bottom right
    ctx.bezierCurveTo(-3, 26, -7, 26, -9, 22); // bottom left
    ctx.bezierCurveTo(-11, 10, -7, -2, 0, -6); // left side
    ctx.closePath();
    const whiteGrad = ctx.createLinearGradient(-10, 0, 10, 0);
    whiteGrad.addColorStop(0, '#E8E0D0');
    whiteGrad.addColorStop(0.3, '#FAF5EA');
    whiteGrad.addColorStop(0.7, '#FAF5EA');
    whiteGrad.addColorStop(1, '#D8D0C0');
    ctx.fillStyle = whiteGrad;
    ctx.fill();
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // Red top portion (above waterline)
    ctx.beginPath();
    ctx.moveTo(0, -22);         // top point (narrow)
    ctx.bezierCurveTo(5, -20, 8, -14, 7, -6);   // right side
    ctx.lineTo(-7, -6);         // bottom edge (waterline)
    ctx.bezierCurveTo(-8, -14, -5, -20, 0, -22); // left side
    ctx.closePath();
    const redGrad = ctx.createLinearGradient(-8, -14, 8, -14);
    redGrad.addColorStop(0, '#A02020');
    redGrad.addColorStop(0.3, '#D43838');
    redGrad.addColorStop(0.6, '#E04040');
    redGrad.addColorStop(1, '#A02020');
    ctx.fillStyle = redGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // Glossy highlight on red
    ctx.beginPath();
    ctx.ellipse(-2, -14, 2, 6, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // Waterline ring (thin band at junction)
    ctx.beginPath();
    ctx.ellipse(0, -6, 7.5, 1.5, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(100,80,50,0.25)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // --- Antenna ---
    // Thin stick emerging from top of body
    const stickW = 1.8;
    const antTop = -70;
    const antBase = -22;

    // Stick — slight taper (thinner at top)
    ctx.beginPath();
    ctx.moveTo(-stickW/2 - 0.3, antBase);
    ctx.lineTo(-stickW/2, antTop + 8);
    ctx.lineTo(stickW/2, antTop + 8);
    ctx.lineTo(stickW/2 + 0.3, antBase);
    ctx.closePath();
    ctx.fillStyle = '#E04040';
    ctx.fill();

    // White band on stick
    const bandY = antTop + (antBase - antTop) * 0.5;
    ctx.beginPath();
    ctx.rect(-stickW/2 - 0.2, bandY, stickW + 0.4, 4);
    ctx.fillStyle = '#F5F0E3';
    ctx.fill();

    // Ball on top
    ctx.beginPath();
    ctx.arc(0, antTop + 8, 3.8, 0, Math.PI * 2);
    const ballGrad = ctx.createRadialGradient(-1, antTop + 6.5, 0.5, 0, antTop + 8, 3.8);
    ballGrad.addColorStop(0, '#FF6060');
    ballGrad.addColorStop(0.5, '#D43838');
    ballGrad.addColorStop(1, '#A02020');
    ctx.fillStyle = ballGrad;
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(-1.2, antTop + 6.5, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    // --- Fishing line (леска) ---
    ctx.beginPath();
    ctx.setLineDash([2, 3]);
    ctx.moveTo(0, 49);
    ctx.lineTo(0, 65);
    ctx.strokeStyle = 'rgba(100,100,100,0.12)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }

  destroy() { this.running = false; }
}

// === Canvas 1: Bite demo ===
const f1 = new FloatAnimator(document.getElementById('c1'));
const fill1 = document.getElementById('fill1');
let p1 = 0;
function tick1() {
  p1 += 0.004;
  if (p1 >= 1) p1 = 0;
  fill1.style.width = (p1 * 100) + '%';
  requestAnimationFrame(tick1);
}
tick1();
function triggerBite() { f1.triggerBite(); }
function togglePause() { f1.paused = !f1.paused; }

// === Canvas 2: Determinate ===
const f2 = new FloatAnimator(document.getElementById('c2'), { bobSpeed: 0.014 });
const fill2 = document.getElementById('fill2');
const label2 = document.getElementById('label2');
function animateDet() {
  let p = 0;
  fill2.style.width = '0%';
  label2.textContent = 'Подключение…';
  const iv = setInterval(() => {
    p += 0.01;
    if (p >= 0.3 && p < 0.32) { label2.textContent = 'Печать…'; f2.triggerBite(); }
    if (p >= 0.7 && p < 0.72) { label2.textContent = 'Отправка данных…'; }
    if (p >= 1) { p = 1; clearInterval(iv); label2.textContent = 'Чек отправлен ✓'; }
    fill2.style.width = (p * 100) + '%';
  }, 50);
}
</script>

</body>
</html>
