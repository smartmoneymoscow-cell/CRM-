<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Trout Arena — Профиль клиента</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet">
<style>
/* === EXACT DECK DESIGN TOKENS === */
:root{
  --orange:#E89829;
  --ink:#14130F;
  --paper:#FAF6EE;
  --green:#3FA66B;
  --gold:#D4A85A;
  --hair:#E7E0D1;
  --muted:#8C8576;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:#1a1814;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  color:#fff;
}

/* Brand header */
.brand-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:32px;
}
.brand-dot{width:12px;height:12px;border-radius:50%;background:var(--orange);}
.brand-name{font-weight:800;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#fff;}
.brand-sub{font-weight:600;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#8A8579;margin-left:2px;}

/* === EXACT DECK PHONE FRAME === */
.phone-frame{
  border:10px solid var(--ink);
  border-radius:36px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 18px 36px rgba(20,19,15,0.15);
  width:375px;
  display:flex;
  flex-direction:column;
}
.phone-status{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px 4px;
  font-size:9.5px;
  font-weight:700;
}
.phone-dots span{
  width:3px;height:3px;border-radius:50%;background:var(--ink);display:block;
}
.phone-body{
  padding:14px 17px 18px;
}

/* === EXACT DECK PROFILE CARD === */
.profile-card{
  background:var(--ink);
  color:#fff;
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
}
.profile-row{
  display:flex;
  gap:10px;
  align-items:center;
}
.profile-avatar{
  width:46px;height:46px;border-radius:50%;
  background:var(--orange);color:#1B1505;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;
  flex-shrink:0;overflow:hidden;
}
.profile-avatar img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.profile-name{
  font-family:'Inter Tight',sans-serif;
  font-weight:800;font-size:14px;line-height:1.3;
}
.profile-meta{
  font-size:9px;color:#B7B2A2;margin-top:2px;line-height:1.5;
}

/* === EXACT DECK BADGE === */
.badge-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(232,152,41,.5);
  border-radius:20px;
  padding:3px 10px 3px 6px;
  font-size:9px;
  font-weight:700;
  margin-top:10px;
  color:var(--orange);
}
.badge-pill::before{content:none;}
.badge-pill svg{display:block;}

/* === EXACT DECK PROFILE STATS === */
.profile-stats{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.profile-stat{
  flex:1;
  background:#fff;
  border:1px solid var(--hair);
  border-radius:12px;
  padding:9px 6px;
  text-align:center;
}
.profile-stat b{
  display:block;
  font-family:'Inter Tight',sans-serif;
  font-weight:800;font-size:16px;
  color:var(--ink);
}
.profile-stat span{
  font-size:8px;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:600;
}

/* === EXACT DECK CATCH CARD (orange background!) === */
.catch-card{
  background:var(--orange);
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:10px;
  color:#1B1505;
}
.catch-badge{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:9px;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.catch-image-wrap{
  background:#FAF6EE;
  border-radius:8px;
  padding:10px 8px;
  margin-bottom:10px;
}
.catch-image{
  width:100%;display:block;
}
.catch-body{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.catch-name{
  font-family:'Inter Tight',sans-serif;
  font-weight:800;font-size:17px;
}
.catch-weight{
  font-family:'Inter Tight',sans-serif;
  font-weight:800;font-size:16px;
}

/* === EXACT DECK STAT LIST === */
.stat-list-title{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:2px;
}
.stat-list-title svg{
  width:11px;height:11px;stroke:var(--muted);fill:none;stroke-width:1.7;
}
.stat-list-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid var(--hair);
  padding:7px 0;
  font-size:11px;
}
.stat-list-row .slr-name{font-weight:700;}
.stat-list-row .slr-count{font-weight:800;width:20px;}
.stat-list-row .slr-avg{color:var(--muted);font-size:9.5px;}

/* === EXACT DECK NAV BAR === */
.nav-bar{
  display:flex;
  border-top:1px solid var(--hair);
  padding:8px 0 2px;
  background:#fff;
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  font-size:8.5px;
  color:var(--muted);
  cursor:pointer;
  background:none;
  border:none;
  font-family:inherit;
}
.nav-item.active{color:var(--orange);}

/* Footer */
.footer{margin-top:32px;text-align:center;}
.footer-title{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:24px;color:#fff;margin-bottom:8px;}
.footer-sub{font-size:13px;color:#8A8579;}
</style>
</head>
<body>

<div class="brand-header">
  <div class="brand-dot"></div>
  <span class="brand-name">Crazy Trout Arena</span>
  <span class="brand-sub">CRM</span>
</div>

<div class="phone-frame">
  <div class="phone-status">
    <span>9:41</span>
    <div class="phone-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="phone-body">

    <!-- Profile card -->
    <div class="profile-card">
      <div class="profile-row">
        <div class="profile-avatar"><img src="assets/img_002.jpeg" alt="Уэйд Джереми"></div>
        <div>
          <div class="profile-name">Уэйд Джереми</div>
          <div class="profile-meta">+7 999 000-00-00<br>wade@mail.ru</div>
        </div>
      </div>
      <div class="badge-pill">
        <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 0h2.4L4.6 4.2 2.2 3.6 4 0zM11.4 0H9L10.8 4.2l2.4-.6L11.4 0z" fill="#C9302C"/><path d="M4.6 4.2 2.2 3.6 5 6.8l1.6-2.6H4.6zM10.8 4.2 13.2 3.6 10.4 6.8 8.8 4.2h2z" fill="#8A1E1B"/><circle cx="8" cy="11.5" r="5.2" fill="url(#silverG)" stroke="#8C8576" stroke-width="0.6"/><circle cx="8" cy="11.5" r="3.4" fill="none" stroke="#8C8576" stroke-width="0.4" opacity=".6"/><path d="M8 8.6l.7 1.9h1.9l-1.55 1.15.6 1.9L8 12.4l-1.65 1.15.6-1.9L5.4 10.5h1.9L8 8.6z" fill="#F3EEDF"/><defs><radialGradient id="silverG" cx="0.35" cy="0.3" r="0.9"><stop offset="0" stop-color="#F7F4EA"/><stop offset="0.55" stop-color="#CFC6B0"/><stop offset="1" stop-color="#8C8576"/></radialGradient></defs></svg>
        Серебряный рыболов
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="profile-stat"><b>24</b><span>Посещений</span></div>
      <div class="profile-stat"><b>68</b><span>Рыб</span></div>
      <div class="profile-stat"><b>1840</b><span>Баллов</span></div>
    </div>

    <!-- Catch card (orange!) -->
    <div class="catch-card">
      <div class="catch-badge">🏆 Лучший улов</div>
      <div class="catch-image-wrap">
        <img class="catch-image" src="assets/img_003.png" alt="Осётр">
      </div>
      <div class="catch-body">
        <div class="catch-name">Осётр</div>
        <div class="catch-weight">5,8 кг</div>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stat-list-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l6-3.5v11L16 14"/></svg>
      Статистика
    </div>
    <div class="stat-list-row">
      <span class="slr-count">4</span>
      <span class="slr-name">Осётр</span>
      <span class="slr-avg">ср. 3,2 кг</span>
    </div>
    <div class="stat-list-row">
      <span class="slr-count">12</span>
      <span class="slr-name">Карп</span>
      <span class="slr-avg">ср. 1,8 кг</span>
    </div>

    <!-- Nav bar -->
    <div class="nav-bar">
      <div class="nav-item">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>
        Карта
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>
        Бронирование
      </div>
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-4 4.5-5.5 7-5.5s5.5 1.5 7 5.5"/></svg>
        Профиль
      </div>
    </div>

  </div>
</div>

<div class="footer">
  <div class="footer-title">Профиль клиента</div>
  <div class="footer-sub">Мобильное приложение для платного пруда</div>
</div>

</body>
</html>
