name: Build APK & IPA

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Генерация Android-обёртки проекта
        run: flutter create . --platforms=android --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Красивое название приложения
        run: sed -i 's/android:label="crazytrout_admin"/android:label="Crazy Trout"/g' android/app/src/main/AndroidManifest.xml

      - name: Разрешения Bluetooth + Камера
        run: |
          sed -i '/<manifest /a \
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.CAMERA" />' \
            android/app/src/main/AndroidManifest.xml

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: flutter pub run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      - name: Сборка релизного APK (только arm64 — ~17 МБ)
        run: flutter build apk --release --target-platform android-arm64

      - name: Публикация APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-release.apk

      - name: Публикация постоянной ссылки (только при пуше тега vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter-app/crazytrout_admin/build/app/outputs/flutter-apk/app-release.apk

  # ──────────────────────────────────────────────
  # iOS IPA (требует macOS-раннер)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter-app/crazytrout_admin
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Генерация iOS-обёртки проекта
        run: flutter create . --platforms=ios --project-name=crazytrout_admin --org=com.crazytroutarena

      - name: Установка зависимостей
        run: flutter pub get

      - name: Генерация иконки приложения из логотипа
        run: flutter pub run flutter_launcher_icons

      - name: Запуск тестов
        run: flutter test

      # Для сборки IPA без подписи (адхок / development) нужен provisioning profile.
      # Без сертификата собираем только .app — его можно запустить на симуляторе
      # или залить через Xcode с подписью вручную.
      - name: Сборка iOS без кодирования (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: Создание IPA из .app
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
          rm -rf Payload

      - name: Публикация IPA как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: flutter-app/crazytrout_admin/app-release.ipa

      - name: Публикация постоянной ссылки (только при пуше тега vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter-app/crazytrout_admin/app-release.ipa
