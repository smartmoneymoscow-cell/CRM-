<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Trout Arena — CRM Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS FROM DECK ===== */
:root{--orange:#E89829;--ember:#886F11;--ink:#14130F;--paper:#FAF6EE;--teal:#2A6A7E;--green:#3FA66B;--gold:#D4A85A;--bone:#E3DCC9;--hair:#E7E0D1;--muted:#8C8576;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#3a3832;color:var(--ink);overflow:hidden;height:100vh;}

/* ===== TOP BAR ===== */
.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:1000;}
.topbar-brand{display:flex;align-items:center;gap:8px;color:#FAF6EE;font-weight:800;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}
.topbar-controls{display:flex;gap:8px;align-items:center;}
.toggle-group{display:flex;background:#2a2822;border-radius:6px;padding:2px;}
.toggle-btn{background:none;border:none;color:#8A8579;font-family:inherit;font-size:11px;font-weight:600;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all 0.15s;}
.toggle-btn.active{background:var(--orange);color:#1B1505;}
.screen-select{background:#2a2822;border:1px solid #3a3832;color:#FAF6EE;font-family:inherit;font-size:11px;padding:5px 8px;border-radius:6px;cursor:pointer;min-width:180px;}

/* ===== LAYOUT ===== */
.app{position:fixed;top:48px;left:0;right:0;bottom:0;display:flex;}
.sidebar{width:220px;background:var(--ink);color:#FAF6EE;padding:16px 10px;flex-shrink:0;overflow-y:auto;}
.sidebar-link{display:block;background:none;border:none;color:#8A8579;font-family:inherit;font-size:11px;font-weight:500;padding:7px 10px;border-radius:6px;cursor:pointer;text-align:left;width:100%;transition:all 0.15s;}
.sidebar-link:hover{background:rgba(255,255,255,0.06);color:#FAF6EE;}
.sidebar-link.active{background:var(--orange);color:#1B1505;font-weight:700;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto;}

/* ===== PHONE FRAME (from deck exact) ===== */
.phone-frame{border:10px solid var(--ink);border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 18px 36px rgba(20,19,15,0.15);width:375px;height:812px;display:flex;flex-direction:column;flex-shrink:0;}
.phone-status{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 2px;font-size:9.5px;font-weight:700;}
.phone-dots{display:flex;gap:3px;}
.phone-dots span{width:3px;height:3px;border-radius:50%;background:#14130F;display:block;}
.phone-body{flex:1;padding:14px 17px 18px;overflow-y:auto;}

/* ===== EXACT DECK CSS ===== */
.phone-logo{display:flex;justify-content:center;margin-bottom:10px;}
.phone-logo img{width:86px;}
.phone-title{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:16px;margin-bottom:12px;}
.field-label{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:5px;}
.field-input{background:#FAF8F2;border:1.5px solid var(--hair);border-radius:9px;padding:9px 11px;font-size:10.5px;margin-bottom:12px;color:#3a382f;}
.btn-block{width:100%;text-align:center;padding:11px;border-radius:9px;font-size:12px;font-weight:800;margin-bottom:10px;cursor:pointer;border:none;font-family:inherit;}
.btn-block.primary{background:var(--orange);color:#1B1505;}
.btn-block.outline{background:#fff;border:1.5px solid var(--hair);color:var(--ink);}
.link-center{text-align:center;font-size:10px;color:var(--orange);font-weight:600;cursor:pointer;}
.link-center.muted{color:var(--muted);font-weight:500;}
.code-row{display:flex;gap:7px;margin-bottom:6px;}
.code-box{width:33px;height:38px;border:1px solid var(--hair);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:#FAF8F2;color:#3a382f;}
.code-box.filled{border-color:var(--orange);color:var(--orange);}
.code-box.empty{color:var(--hair);}
.timer-note{font-size:9.5px;color:var(--muted);margin-bottom:14px;}
.strength-row{display:flex;gap:5px;margin-bottom:6px;}
.strength-seg{flex:1;height:5px;border-radius:3px;background:var(--green);}
.strength-seg.off{background:var(--hair);}
.strength-label{font-size:9.5px;color:var(--green);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:5px;}
.strength-label::before{content:"●";font-size:7px;}
.ph-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ph-title{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:14px;}
.ph-chips{display:flex;gap:6px;margin-bottom:8px;}
.chip{display:flex;align-items:center;gap:4px;background:#F4F0E8;border-radius:20px;padding:3px 8px;font-size:9.5px;font-weight:600;}
.chip svg{width:10px;height:10px;}
.pond-svg-wrap{border-radius:10px;overflow:hidden;margin-bottom:10px;line-height:0;}
.pond-svg-wrap img{width:100%;height:auto;display:block;}
.legend{display:flex;gap:12px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9.5px;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.btn-book{background:var(--orange);color:#1B1505;font-weight:700;font-size:11.5px;border-radius:9px;padding:10px;text-align:center;cursor:pointer;border:none;width:100%;}
.field-val{background:#FAF8F2;border:1.5px solid var(--hair);border-radius:9px;padding:9px 11px;font-size:10.5px;margin-bottom:12px;color:#3a382f;}
.rows{margin-top:14px;}
.price-row{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;padding:9px 0;color:#3a382f;border-top:1px solid var(--hair);}
.rows .price-row:first-child{border-top:none;padding-top:0;}
.price-total{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:800;padding-top:10px;border-top:1px solid var(--hair);color:var(--ink);}
.btn-pay{background:var(--orange);color:#1B1505;font-weight:700;font-size:11.5px;border-radius:9px;padding:10px;text-align:center;margin-top:10px;cursor:pointer;border:none;width:100%;}
.profile-card{background:var(--ink);color:#fff;border-radius:14px;padding:18px;margin-bottom:14px;}
.profile-avatar{width:48px;height:48px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-family:'Inter Tight';font-weight:800;font-size:18px;color:#1B1505;margin:0 auto 10px;}
.profile-name{font-family:'Inter Tight';font-weight:800;font-size:16px;text-align:center;margin-bottom:2px;}
.profile-meta{font-size:11px;color:#8A8579;text-align:center;}
.profile-stats{display:flex;gap:8px;margin-bottom:14px;}
.profile-stat{flex:1;background:#fff;border:1.5px solid var(--hair);border-radius:12px;padding:12px;text-align:center;}
.profile-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--hair);}
.profile-row:last-child{border-bottom:none;}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hist-header b{font-family:'Inter Tight';font-weight:800;font-size:12px;}
.hist-header span{font-size:9px;color:var(--muted);}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair);}
.hist-row:last-child{border-bottom:none;}
.hist-date{width:36px;text-align:center;}
.hist-date b{font-family:'Inter Tight';font-weight:800;font-size:16px;display:block;}
.hist-date span{font-size:9px;color:var(--muted);}
.hist-mid{flex:1;}
.hist-mid b{font-size:11px;font-weight:700;display:block;}
.hist-mid span{font-size:9px;color:var(--muted);}
.hist-chev{color:var(--muted);font-size:14px;}
.tag{display:inline-block;font-size:9px;font-weight:700;border-radius:12px;padding:2px 7px;margin-right:4px;}
.badge-pill{font-size:9px;font-weight:700;border-radius:20px;padding:3px 8px;}
.catch-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:12px;background:#E1F1E6;color:var(--green);}
.av{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.sm{font-size:9px;}
.dt{font-size:10px;}
.lbl{font-size:8px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.val{font-family:'Inter Tight';font-weight:800;font-size:20px;}
.b{font-weight:700;}
.g{color:var(--green);}
.o{color:var(--orange);}
.n{color:var(--ink);}
.p{color:var(--muted);}
.ok{color:var(--green);}
.off{color:var(--hair);}
.dark{background:var(--ink);color:#fff;}
.v{color:var(--green);}
.l{color:var(--teal);}
.pr{color:var(--gold);}
.nm{font-family:'Inter Tight';font-weight:800;}

/* Admin mobile */
.adm-title{font-family:'Inter Tight';font-weight:800;font-size:14px;margin-bottom:10px;}
.adm-chips{display:flex;gap:6px;margin-bottom:10px;}
.adm-chip{display:flex;align-items:center;gap:4px;background:#F4F0E8;border-radius:20px;padding:3px 8px;font-size:9.5px;font-weight:600;}
.adm-tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.adm-tile{background:#FAF8F2;border:1.5px solid var(--hair);border-radius:12px;padding:10px 12px;}
.adm-tile.dark{background:var(--ink);color:#fff;border-color:rgba(255,255,255,0.1);}
.adm-search{background:#FAF8F2;border:1.5px solid var(--hair);border-radius:9px;padding:8px 11px;font-size:10px;color:var(--muted);margin-bottom:10px;cursor:pointer;}
.adm-filters{display:flex;gap:6px;margin-bottom:10px;}
.adm-filter{background:#FAF8F2;border:1.5px solid var(--hair);border-radius:8px;padding:6px 10px;font-size:9px;font-weight:600;text-align:center;cursor:pointer;flex:1;}
.adm-filter.active{background:var(--orange);border-color:var(--orange);color:#1B1505;}
.adm-receipt-row{background:#fff;border:1.5px solid var(--hair);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.adm-btn{background:var(--orange);color:#1B1505;font-weight:700;font-size:11px;border-radius:9px;padding:8px 14px;border:none;cursor:pointer;font-family:inherit;}
.adm-btns{display:flex;gap:8px;margin-top:10px;}
.adm-add{background:var(--ink);color:#fff;font-weight:700;font-size:11px;border-radius:9px;padding:8px 14px;border:none;cursor:pointer;font-family:inherit;width:100%;}
.adm-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8.5px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;}
.adm-nav-item.active{color:var(--orange);}
.adm-navbar{display:flex;border-top:1px solid var(--hair);padding:8px 0 2px;}
.adm-client{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--hair);}
.adm-fld{margin-bottom:8px;}
.adm-fld-lbl{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:3px;}
.adm-total{display:flex;justify-content:space-between;font-size:12px;font-weight:800;padding-top:8px;border-top:1px solid var(--hair);}
.adm-legend{display:flex;gap:10px;margin-bottom:10px;}
.adm-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;}
.adm-fish-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--hair);}

/* Finance */
.fin-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.fin-cell{background:#fff;border:1.5px solid var(--hair);border-radius:12px;padding:12px;text-align:center;}
.fin-cell-wide{grid-column:span 2;}
.fin-period{display:flex;gap:4px;margin-bottom:14px;}
.fin-chart{position:relative;height:140px;margin-bottom:10px;}
.fin-chart--mobile{height:120px;}
.fin-gridline{position:absolute;left:0;right:0;border-top:1px dashed var(--hair);}
.fin-y-axis{position:absolute;left:0;top:0;bottom:0;width:30px;display:flex;flex-direction:column;justify-content:space-between;font-size:8px;color:var(--muted);}
.fin-x-axis{display:flex;justify-content:space-between;font-size:8px;color:var(--muted);padding:0 30px 0 30px;}
.fin-legend{display:flex;gap:12px;justify-content:center;font-size:9px;}
.fin-legend--mobile{flex-wrap:wrap;}

/* Stat list */
.stat-list-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--hair);}
.stat-list-title{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}

/* Catch card */
.catch-card{background:#fff;border:1.5px solid var(--hair);border-radius:12px;padding:10px;margin-bottom:8px;}
.catch-image-wrap{width:48px;height:48px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.catch-image{width:100%;height:100%;object-fit:cover;}
.catch-name{font-weight:700;font-size:11px;}
.catch-weight{font-family:'Inter Tight';font-weight:800;font-size:14px;color:var(--orange);}
.catch-body{flex:1;}

/* Salary */
.slr-avg{font-family:'Inter Tight';font-weight:800;font-size:24px;color:var(--orange);}
.slr-count{font-size:10px;color:var(--muted);}
.slr-name{font-size:11px;font-weight:700;}

/* Desktop content */
.desktop-content{width:100%;max-width:1000px;padding:24px;}

/* Phone frame sizing */
.phone-frame .phone-body::-webkit-scrollbar{width:3px;}
.phone-frame .phone-body::-webkit-scrollbar-thumb{background:var(--hair);border-radius:3px;}

/* Responsive */
@media(max-width:700px){
  .sidebar{display:none!important;}
  .main{padding:8px;}
  .phone-frame{width:100%;height:calc(100vh - 56px);border-radius:0;border:none;box-shadow:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><div class="topbar-dot"></div><span>Crazy Trout Arena CRM</span></div>
  <div class="topbar-controls">
    <div class="toggle-group" id="viewToggle">
      <button class="toggle-btn" data-view="desktop">🖥 Десктоп</button>
      <button class="toggle-btn active" data-view="mobile">📱 Мобайл</button>
    </div>
    <select class="screen-select" id="screenSelect"></select>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div style="display:flex;align-items:center;gap:8px;padding:0 10px;margin-bottom:16px;">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--orange);"></div>
      <div>
        <div style="font-weight:800;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;">Crazy Trout Arena</div>
        <div style="font-size:9px;color:#6B6560;">CRM Prototype</div>
      </div>
    </div>
    <nav id="sidebarNav"></nav>
  </aside>

  <main class="main">
    <div class="phone-frame" id="phoneFrame">
      <div class="phone-status"><span>9:41</span><div class="phone-dots"><span></span><span></span><span></span></div></div>
      <div class="phone-body" id="phoneScreen"></div>
    </div>
    <div class="desktop-content" id="desktopContent" style="display:none;"></div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
