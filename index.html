<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crazy Trout Arena — CRM Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <div class="topbar-brand"><div class="topbar-dot"></div><span>Crazy Trout Arena CRM</span></div>
  <div class="topbar-controls">
    <div class="toggle-group" id="modeToggle">
      <button class="toggle-btn active" data-mode="client">👤 Клиент</button>
      <button class="toggle-btn" data-mode="admin">⚙️ Админ</button>
    </div>
    <div class="toggle-group" id="viewToggle">
      <button class="toggle-btn active" data-view="desktop">🖥 Десктоп</button>
      <button class="toggle-btn" data-view="mobile">📱 Мобайл</button>
    </div>
    <select class="screen-select" id="screenSelect"></select>
  </div>
</div>

<!-- ===== VIEWPORT ===== -->
<div class="viewport" id="viewport">
  <div class="viewport-inner desktop-mode" id="viewportInner">

    <!-- Sidebar: Client -->
    <aside class="sidebar" id="clientSidebar">
      <div class="sidebar-brand"><div class="sidebar-dot"></div><div><div class="sidebar-name">Crazy Trout Arena</div><div class="sidebar-sub">Клиент</div></div></div>
      <nav class="sidebar-nav" id="clientNav"></nav>
    </aside>

    <!-- Sidebar: Admin -->
    <aside class="sidebar" id="adminSidebar" style="display:none">
      <div class="sidebar-brand"><div class="sidebar-dot admin-dot"></div><div><div class="sidebar-name">CTA Admin</div><div class="sidebar-sub">Панель управления</div></div></div>
      <nav class="sidebar-nav" id="adminNav"></nav>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent">
      <!-- Desktop content area -->
      <div class="desktop-screen" id="desktopScreen"></div>
      <!-- Phone frame for mobile view -->
      <div class="phone-frame" id="phoneFrame" style="display:none">
        <div class="phone-status"><span>9:41</span><div class="phone-dots"><span></span><span></span><span></span></div></div>
        <div class="phone-screen" id="phoneScreen"></div>
      </div>
    </main>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
